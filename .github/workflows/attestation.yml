name: Build and Attest

on:
  push:
    branches: [main]

# TODO: Set permissions to default deny ({})
permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    # TODO: Add permissions needed for attestation
    permissions:
      id-token: write       #⬅️ needed for Sigstore OIDC signing
      contents: read        #⬅️ read the repository
      attestations: write 
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci && npm run build

      - name: Create artifact
        run: tar -czf app.tar.gz dist/

      - name: Generate artifact attestation
        uses: actions/attest@v4              #⬅️ official GitHub action
        with:
          subject-path: 'app.tar.gz'        #⬅️ file the attestation covers

      - uses: actions/upload-artifact@v4
        with:
          name: app-artifact
          path: app.tar.gz
